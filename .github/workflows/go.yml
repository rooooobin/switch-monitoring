# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Verify dependencies
      run: go mod tidy        

    - name: Build
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o switch-monitor-arm64 ./cmd/switch-monitor

    - name: Test
      run: go test -v ./...
    
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: switch-monitor-arm64
        path: switch-monitor-arm64

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:    
        version: v1.64.8
        args: --timeout=5m --out-format=github-actions --go=1.24

